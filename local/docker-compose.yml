# Local stack: MongoDB + the Next.js app (production image built from ../Dockerfile).
#
#   docker compose -f local/docker-compose.yml up --build        # start db + app
#   docker compose -f local/docker-compose.yml run --rm seed      # load the 76 seed entries
#   docker compose -f local/docker-compose.yml down               # stop (add -v to wipe the db)
#
# App: http://localhost:3000

name: joi-deck-local

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      # Host 27018 avoids clashing with a MongoDB already running on 27017.
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  

  app:
    build:
      context: ..
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/joi_deck
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy

  # One-off seeder — runs the builder stage (which still has tsx + the source).
  #   docker compose -f local/docker-compose.yml run --rm seed
  seed:
    build:
      context: ..
      dockerfile: Dockerfile
      target: builder
    environment:
      MONGODB_URI: mongodb://mongo:27017/joi_deck
    command: ["npm", "run", "seed"]
    depends_on:
      mongo:
        condition: service_healthy
    profiles:
      - seed

volumes:
  mongo-data:
